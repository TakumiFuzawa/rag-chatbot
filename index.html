<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-900 学習チャットボット</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ベース */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* チャット全体のラッパー */
    .chat-wrapper {
      width: 100%;
      max-width: 520px;
      height: 90vh;
      max-height: 720px;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    /* ヘッダー */
    .chat-header {
      background: #185FA5;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-icon {
      font-size: 32px;
      line-height: 1;
    }

    .header-text h1 {
      color: #E6F1FB;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
    }

    .header-text p {
      color: #85B7EB;
      font-size: 12px;
      margin-top: 2px;
    }

    /* メッセージエリア */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* スクロールバーのデザイン */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 4px;
    }

    /* AIメッセージ */
    .ai-msg {
      align-self: flex-start;
      max-width: 85%;
    }

    .ai-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
      padding-left: 4px;
    }

    .ai-bubble {
      background: #f0f2f5;
      border-radius: 4px 16px 16px 16px;
      padding: 12px 16px;
      font-size: 14px;
      color: #222;
      line-height: 1.7;
      word-break: break-word;
    }

    /* 参照ページ */
    .page-ref {
      font-size: 11px;
      color: #185FA5;
      margin-top: 8px;
      padding: 4px 8px;
      background: #E6F1FB;
      border-radius: 8px;
      display: inline-block;
    }

    /* ユーザーメッセージ */
    .user-msg {
      align-self: flex-end;
      max-width: 80%;
    }

    .user-bubble {
      background: #185FA5;
      color: #ffffff;
      border-radius: 16px 4px 16px 16px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* タイピングアニメーション */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 2px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
      40% { transform: translateY(-7px); opacity: 1; }
    }

    /* サンプル質問 */
    .sample-questions {
      padding: 8px 16px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
      border-top: 1px solid #f0f0f0;
    }

    .sample-label {
      width: 100%;
      font-size: 11px;
      color: #999;
      margin-bottom: 2px;
    }

    .sample-btn {
      background: #E6F1FB;
      color: #185FA5;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .sample-btn:hover {
      background: #B5D4F4;
    }

    /* 入力エリア */
    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      background: #fff;
    }

    .chat-input {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      color: #222;
      background: #fafafa;
    }

    .chat-input:focus {
      border-color: #185FA5;
      background: #fff;
    }

    .chat-input::placeholder {
      color: #bbb;
    }

    .send-btn {
      background: #185FA5;
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: #0C447C;
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    /* レスポンシブ対応 */
    @media (max-width: 480px) {
      body {
        padding: 0;
        align-items: stretch;
      }

      .chat-wrapper {
        max-width: 100%;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }

      .chat-header {
        padding: 12px 16px;
      }

      .header-icon {
        font-size: 28px;
      }

      .header-text h1 {
        font-size: 15px;
      }

      .ai-bubble, .user-bubble {
        font-size: 13px;
      }

      .chat-input {
        font-size: 13px;
      }

      .sample-btn {
        font-size: 11px;
        padding: 5px 12px;
      }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- ヘッダー -->
  <div class="chat-header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>AI-900 学習チャット</h1>
      <p>sample.pdf を参照して回答します</p>
    </div>
  </div>

  <!-- メッセージエリア -->
  <div class="chat-messages" id="chatMessages">
    <div class="ai-msg">
      <div class="ai-label">🤖 AI</div>
      <div class="ai-bubble">
        こんにちは！AI-900の学習をサポートします。<br>
        下のボタンか、テキストで質問してください 😊
      </div>
    </div>
  </div>

  <!-- サンプル質問 -->
  <div class="sample-questions">
    <div class="sample-label">よくある質問：</div>
    <button class="sample-btn" onclick="setQuestion('RAGとは何ですか？')">RAGとは？</button>
    <button class="sample-btn" onclick="setQuestion('AI-900の合格点は何点ですか？')">合格点は？</button>
    <button class="sample-btn" onclick="setQuestion('責任あるAIの原則を教えてください')">責任あるAI</button>
    <button class="sample-btn" onclick="setQuestion('教師あり学習とは何ですか？')">教師あり学習</button>
  </div>

  <!-- 入力エリア -->
  <div class="chat-input-area">
    <input
      type="text"
      class="chat-input"
      id="questionInput"
      placeholder="質問を入力してください..."
      onkeypress="handleKeyPress(event)"
      maxlength="200"
    >
    <button class="send-btn" id="sendBtn" onclick="sendQuestion()" aria-label="送信">
      ➤
    </button>
  </div>

</div>

<script>
  // メッセージを追加する関数
  function addMessage(type, content, pages) {
    const messages = document.getElementById('chatMessages');
    const div = document.createElement('div');

    if (type === 'user') {
      div.className = 'user-msg';
      div.innerHTML = `<div class="user-bubble">${escapeHtml(content)}</div>`;

    } else if (type === 'ai') {
      div.className = 'ai-msg';
      const pageRef = pages && pages.length > 0
        ? `<div class="page-ref">📄 参照ページ：${pages.join(', ')}</div>`
        : '';
      div.innerHTML = `
        <div class="ai-label">🤖 AI</div>
        <div class="ai-bubble">${escapeHtml(content)}${pageRef}</div>
      `;

    } else if (type === 'typing') {
      div.className = 'ai-msg';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="ai-label">🤖 AI</div>
        <div class="ai-bubble">
          <div class="typing">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      `;
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  // XSS対策：HTMLエスケープ
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  // 質問を送信する関数
  async function sendQuestion() {
    const input = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const question = input.value.trim();

    if (!question) return;

    // ユーザーメッセージを表示
    addMessage('user', question);
    input.value = '';
    sendBtn.disabled = true;

    // タイピングアニメーション表示
    addMessage('typing');

    try {
      // APIに質問を送信
      const response = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question })
      });

      if (!response.ok) throw new Error('サーバーエラー');

      const data = await response.json();

      // タイピングアニメーション削除
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();

      // AI回答を表示
      addMessage('ai', data.answer, data.pages);

    } catch (error) {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
      addMessage('ai', 'エラーが発生しました。もう一度お試しください。', []);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  // Enterキーで送信
  function handleKeyPress(event) {
    if (event.key === 'Enter') sendQuestion();
  }

  // サンプル質問をセット
  function setQuestion(text) {
    document.getElementById('questionInput').value = text;
    sendQuestion();
  }
</script>

</body>
</html>
